<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 380px; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; background: #1a1a2e; color: #e0e0e0; }
    .header { padding: 12px 16px; background: #16213e; border-bottom: 1px solid #0f3460; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .status { font-size: 11px; color: #8899aa; margin-top: 2px; }
    .search-box { padding: 8px 12px; }
    .search-box input { width: 100%; padding: 8px 12px; border: 1px solid #0f3460; border-radius: 6px; background: #16213e; color: #e0e0e0; font-size: 13px; outline: none; }
    .search-box input:focus { border-color: #533483; }
    .results { max-height: 320px; overflow-y: auto; }
    .entry { padding: 8px 16px; border-bottom: 1px solid #0f3460; cursor: pointer; }
    .entry:hover { background: #16213e; }
    .entry .name { font-weight: 500; font-size: 13px; }
    .entry .meta { font-size: 11px; color: #8899aa; margin-top: 2px; }
    .entry .fields { margin-top: 4px; }
    .field-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; font-size: 12px; }
    .field-row .key { color: #8899aa; }
    .field-row .value { font-family: monospace; color: #aabbcc; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .field-row .copy-btn { margin-left: 8px; padding: 2px 8px; border: 1px solid #533483; border-radius: 4px; background: transparent; color: #533483; cursor: pointer; font-size: 11px; }
    .field-row .copy-btn:hover { background: #533483; color: #fff; }
    .empty { padding: 40px 16px; text-align: center; color: #8899aa; }
    .error { padding: 16px; color: #e74c3c; text-align: center; }
    .settings-link { display: block; padding: 8px 16px; text-align: center; font-size: 11px; color: #533483; text-decoration: none; border-top: 1px solid #0f3460; }
    .settings-link:hover { text-decoration: underline; }
    .profile-selector { display: none; padding: 4px 12px 8px; gap: 6px; flex-wrap: wrap; }
    .profile-btn { padding: 3px 10px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #8899aa; cursor: pointer; font-size: 11px; }
    .profile-btn:hover { border-color: #533483; }
    .profile-btn.active { background: #533483; color: #fff; border-color: #533483; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔐 OmniKey Vault</h1>
    <div class="status" id="status">连接中...</div>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="搜索条目..." autocomplete="off" />
  </div>
  <div class="profile-selector" id="profileSelector"></div>
  <div class="results" id="results"></div>
  <a href="#" class="settings-link" id="settingsLink">⚙ 配对设置</a>
  <script src="popup.js"></script>
</body>
</html>
