name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SourceLink needs full history

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore OmniKeyVault.sln

      - name: Build
        run: dotnet build OmniKeyVault.sln -c Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test OmniKeyVault.sln
          -c Release
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./TestResults/**/coverage.cobertura.xml

  publish:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish win-x64
        run: >
          dotnet publish src/OmniKeyVault.Cli
          -c Release
          -r win-x64
          --self-contained true
          -o publish/win-x64
          -p:PublishSingleFile=false

      - name: Copy docs
        run: Copy-Item docs\*.md publish\win-x64\docs\ -Recurse -Force

      - name: Package
        run: >
          $tag = ${env:GITHUB_REF} -replace 'refs/tags/v','';
          Compress-Archive
          -Path publish\win-x64\*
          -DestinationPath publish\OmniKeyVault-${tag}-win-x64.zip
          -Force
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/OmniKeyVault-*-win-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
